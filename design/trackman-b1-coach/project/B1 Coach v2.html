<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #080809; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(255,107,26,0.4); }
    70%  { box-shadow: 0 0 0 14px rgba(255,107,26,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,107,26,0); }

  @keyframes shimmer {
    0%   { background-position: -600px 0; }
    100% { background-position: 600px 0; }

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#FF6B1A",
  "showSubtitle": true
} /*EDITMODE-END*/;

// ── iPad landscape dimensions ──────────────────────────────────────────────
const SCREEN_W = 1024;
const SCREEN_H = 768;
const BEZEL = 16;
// Shell outer: W + bezel*2, H + bezel*2 + camera strip on short edge
// Landscape: camera on top-right short edge, home indicator at bottom
const SHELL_W = SCREEN_W + BEZEL * 2;
const SHELL_H = SCREEN_H + BEZEL * 2 + 44; // extra bottom for home bar

// ── Goals ──────────────────────────────────────────────────────────────────
const GOALS = [
{ id: 'power', label: 'Power & Home Runs', subtitle: 'Exit velocity · Launch angle · Distance', type: 'power', tag: 'Launch Angle 20–35°', color: '#FF6B1A', dashboard: false },
{ id: 'contact', label: 'Line Drives & Contact', subtitle: 'Barrel rate · Sweet spot · Spray chart', type: 'contact', tag: 'LA 10–15° · Hard Hit %', color: '#F5A623', dashboard: false },
{ id: 'allfields', label: 'Hit to All Fields', subtitle: 'Pull% · Center% · Opposite field%', type: 'allfields', tag: 'Spray distribution', color: '#E8C547', dashboard: false },
{ id: 'popup', label: 'Reduce Pop-Ups', subtitle: 'Attack angle · Swing path · Tee work', type: 'popup', tag: 'LA < 0° ↓ · Drive more', color: '#5BC8AF', dashboard: false },
{ id: 'open', label: 'Open Session', subtitle: 'Free practice · No target metrics', type: 'open', tag: 'All metrics tracked', color: '#8B9FBF', dashboard: false },
{ id: 'dashboard', label: 'Full Dashboard', subtitle: 'All metrics & raw session data', type: 'dashboard', tag: 'Advanced · All charts', color: '#7B9EB8', dashboard: true }];


// ── Icons ──────────────────────────────────────────────────────────────────
function GoalIcon({ type, color, size = 30 }) {
  const s = { width: size, height: size };
  const p = { fill: 'none', stroke: color, strokeLinecap: 'round', strokeLinejoin: 'round' };
  if (type === 'power') return (
    <svg {...s} viewBox="0 0 48 48" {...p}>
      <path d="M24 6L28 18H40L30 26L34 38L24 30L14 38L18 26L8 18H20L24 6Z" stroke={color} strokeWidth="2.2" fill={color} fillOpacity="0.12" />
      <line x1="38" y1="8" x2="44" y2="4" stroke={color} strokeWidth="2" opacity="0.5" />
      <line x1="40" y1="13" x2="47" y2="11" stroke={color} strokeWidth="2" opacity="0.35" />
    </svg>);

  if (type === 'contact') return (
    <svg {...s} viewBox="0 0 48 48" {...p}>
      <circle cx="14" cy="24" r="8" strokeWidth="2" fill={color} fillOpacity="0.12" />
      <rect x="26" y="20" width="6" height="20" rx="3" fill={color} fillOpacity="0.12" strokeWidth="2" transform="rotate(-30 29 30)" />
      <circle cx="25" cy="20" r="2.5" fill={color} />
      <line x1="25" y1="14" x2="25" y2="17" strokeWidth="1.5" />
      <line x1="29" y1="15" x2="27" y2="17.5" strokeWidth="1.5" />
    </svg>);

  if (type === 'allfields') return (
    <svg {...s} viewBox="0 0 48 48" {...p}>
      <path d="M24 40 L8 40 L8 16 Q24 4 40 16 L40 40 Z" strokeWidth="2" fill={color} fillOpacity="0.08" />
      <path d="M24 36 L10 22" strokeWidth="2" />
      <path d="M24 36 L24 14" strokeWidth="2.5" />
      <path d="M24 36 L38 22" strokeWidth="2" />
      <polyline points="7,24 10,22 12,25" strokeWidth="1.5" fill="none" />
      <polyline points="22,16 24,14 26,16" strokeWidth="1.5" fill="none" />
      <polyline points="36,25 38,22 41,24" strokeWidth="1.5" fill="none" />
    </svg>);

  if (type === 'popup') return (
    <svg {...s} viewBox="0 0 48 48" {...p}>
      <path d="M10 38 Q12 10 24 8 Q36 6 38 38" strokeWidth="2" fill="none" opacity="0.3" strokeDasharray="3 3" />
      <line x1="28" y1="12" x2="36" y2="20" strokeWidth="2.5" />
      <line x1="36" y1="12" x2="28" y2="20" strokeWidth="2.5" />
      <path d="M10 38 Q18 30 38 32" strokeWidth="2.5" />
      <circle cx="38" cy="32" r="3" fill={color} fillOpacity="0.5" strokeWidth="1.5" />
    </svg>);

  if (type === 'open') return (
    <svg {...s} viewBox="0 0 48 48" {...p}>
      <circle cx="24" cy="24" r="16" strokeWidth="2" fill={color} fillOpacity="0.1" />
      <path d="M18 10 Q12 24 18 38" strokeWidth="2" />
      <path d="M30 10 Q36 24 30 38" strokeWidth="2" />
      <line x1="16" y1="18" x2="12" y2="20" strokeWidth="1.5" />
      <line x1="15" y1="23" x2="11" y2="24" strokeWidth="1.5" />
      <line x1="32" y1="18" x2="36" y2="20" strokeWidth="1.5" />
      <line x1="33" y1="23" x2="37" y2="24" strokeWidth="1.5" />
    </svg>);

  if (type === 'dashboard') return (
    <svg {...s} viewBox="0 0 48 48" {...p}>
      {/* grid of mini charts */}
      <rect x="6" y="6" width="16" height="16" rx="3" strokeWidth="1.8" fill={color} fillOpacity="0.08" />
      <rect x="26" y="6" width="16" height="16" rx="3" strokeWidth="1.8" fill={color} fillOpacity="0.08" />
      <rect x="6" y="26" width="16" height="16" rx="3" strokeWidth="1.8" fill={color} fillOpacity="0.08" />
      <rect x="26" y="26" width="16" height="16" rx="3" strokeWidth="1.8" fill={color} fillOpacity="0.08" />
      {/* mini bars in top-left */}
      <rect x="9" y="16" width="3" height="4" rx="1" fill={color} opacity="0.7" />
      <rect x="13" y="12" width="3" height="8" rx="1" fill={color} opacity="0.7" />
      <rect x="17" y="9" width="3" height="11" rx="1" fill={color} opacity="0.7" />
      {/* mini line in top-right */}
      <polyline points="29,18 33,13 37,15 41,10" strokeWidth="2" fill="none" opacity="0.8" />
      {/* mini scatter in bottom-left */}
      <circle cx="12" cy="36" r="1.5" fill={color} opacity="0.6" />
      <circle cx="17" cy="32" r="1.5" fill={color} opacity="0.6" />
      <circle cx="14" cy="38" r="1.5" fill={color} opacity="0.6" />
      {/* mini gauge in bottom-right */}
      <path d="M31 38 A7 7 0 0 1 41 38" strokeWidth="2" fill="none" opacity="0.5" />
      <path d="M31 38 A7 7 0 0 1 37 31" strokeWidth="2.5" fill="none" opacity="0.9" />
      <circle cx="36" cy="38" r="1.5" fill={color} />
    </svg>);

  return null;
}

// ── Badge ──────────────────────────────────────────────────────────────────
function Badge({ label, color }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center',
      padding: '3px 9px', borderRadius: 100,
      background: `${color}1A`,
      border: `1px solid ${color}45`,
      fontFamily: "'Barlow Condensed', sans-serif",
      fontWeight: 600, fontSize: 12, letterSpacing: '0.06em',
      color: color, textTransform: 'uppercase', whiteSpace: 'nowrap'
    }}>{label}</span>);

}

function AdvancedPill() {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center',
      padding: '2px 8px', borderRadius: 100,
      background: 'rgba(123,158,184,0.15)',
      border: '1px solid rgba(123,158,184,0.35)',
      fontFamily: "'Barlow Condensed', sans-serif",
      fontWeight: 700, fontSize: 10, letterSpacing: '0.1em',
      color: '#7B9EB8', textTransform: 'uppercase'
    }}>Advanced</span>);

}

// ── Goal Card (landscape grid variant) ────────────────────────────────────
function GoalCard({ goal, selected, onSelect, index, revealed }) {
  const [pressed, setPressed] = useState(false);
  const isSelected = selected === goal.id;
  const isDash = goal.dashboard;

  return (
    <div
      onClick={() => onSelect(goal.id)}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)}
      onTouchStart={() => setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      style={{
        position: 'relative',
        borderRadius: 18,
        cursor: 'pointer',
        overflow: 'hidden',
        animation: revealed ? `cardIn 0.5s cubic-bezier(0.22,1,0.36,1) ${0.06 + index * 0.055}s both` : 'none',
        transform: pressed ? 'scale(0.974)' : isSelected ? 'scale(1.012)' : 'scale(1)',
        transition: 'transform 0.16s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease, border-color 0.22s ease',
        border: isSelected ?
        `1.5px solid ${goal.color}CC` :
        '1.5px solid rgba(255,255,255,0.16)',
        boxShadow: isSelected ?
        `0 0 0 1px ${goal.color}30, 0 8px 32px ${goal.color}25, 0 2px 12px rgba(0,0,0,0.55)` :
        '0 2px 12px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05)',
        background: isSelected ?
        `linear-gradient(140deg, ${goal.color}12 0%, rgba(30,32,38,0.98) 55%)` :
        'linear-gradient(160deg, rgba(34,36,43,0.97) 0%, rgba(26,28,34,0.98) 100%)'
      }}>
      
      {/* Left accent bar */}
      <div style={{
        position: 'absolute', left: 0, top: 0, bottom: 0,
        width: isSelected ? 6 : 5,
        background: goal.color,
        opacity: isSelected ? 1 : 0.65,
        transition: 'width 0.2s, opacity 0.2s',
        borderRadius: '0 3px 3px 0'
      }} />

      {/* Selected glow */}
      {isSelected &&
      <div style={{
        position: 'absolute', inset: 0,
        background: `radial-gradient(ellipse at 12% 50%, ${goal.color}12 0%, transparent 60%)`,
        pointerEvents: 'none'
      }} />
      }

      {/* Content */}
      <div style={{ display: 'flex', flexDirection: 'column', height: '100%', padding: '16px 18px 16px 24px' }}>

        {/* Top row: icon + (advanced pill for dashboard) + selector */}
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 12 }}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 7, alignItems: 'flex-start' }}>
            <div style={{
              width: 62, height: 62,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              background: isSelected ? `${goal.color}22` : `${goal.color}12`,
              borderRadius: 16,
              border: `1px solid ${goal.color}${isSelected ? '50' : '28'}`,
              transition: 'background 0.2s, border-color 0.2s',
              flexShrink: 0
            }}>
              <GoalIcon type={goal.type} color={isSelected ? goal.color : `${goal.color}CC`} size={38} />
            </div>
            {isDash && <AdvancedPill />}
          </div>

          <div />
        </div>

        {/* Label */}
        <div style={{
          fontFamily: "'Barlow Condensed', sans-serif",
          fontWeight: 700, fontSize: 23, lineHeight: 1.05, letterSpacing: '0.005em',
          color: isSelected ? '#fff' : 'rgba(255,255,255,0.9)',
          marginBottom: 6, transition: 'color 0.2s'
        }}>{goal.label}</div>

        {/* Subtitle */}
        <div style={{
          fontFamily: "'Barlow', sans-serif",
          fontSize: 13, lineHeight: 1.45,
          color: isSelected ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.4)',
          marginBottom: 12, flex: 1, transition: 'color 0.2s'
        }}>{goal.subtitle}</div>

        {/* Metric badge — uniform style */}
        <div>
          <Badge label={goal.tag} color={isSelected ? goal.color : `${goal.color}AA`} />
        </div>
      </div>
    </div>);

}

// ── TrackMan logo ──────────────────────────────────────────────────────────
function TrackManLogo({ color }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
        <path d="M16 28C22.627 28 28 22.627 28 16S22.627 4 16 4" stroke={color} strokeWidth="2.5" strokeLinecap="round" opacity="0.35" />
        <path d="M16 23C19.866 23 23 19.866 23 16S19.866 9 16 9" stroke={color} strokeWidth="2.5" strokeLinecap="round" opacity="0.6" />
        <path d="M16 18C17.105 18 18 17.105 18 16S17.105 14 16 14" stroke={color} strokeWidth="2.5" strokeLinecap="round" />
        <circle cx="16" cy="16" r="2" fill={color} />
        <line x1="4" y1="28" x2="16" y2="16" stroke={color} strokeWidth="2" strokeLinecap="round" opacity="0.5" />
      </svg>
      <div style={{ display: 'flex', flexDirection: 'column', lineHeight: 1 }}>
        <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 10, letterSpacing: '0.25em', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase' }}>Powered by</span>
        <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 16, letterSpacing: '0.06em', color: 'rgba(255,255,255,0.85)', textTransform: 'uppercase' }}>TrackMan</span>
      </div>
    </div>);

}

// ── Radar decoration ───────────────────────────────────────────────────────
function RadarDecor() {
  return (
    <svg style={{ position: 'absolute', top: -80, right: -80, opacity: 0.035, pointerEvents: 'none' }}
    width="360" height="360" viewBox="0 0 360 360" fill="none">
      {[1, 2, 3, 4, 5].map((i) => <circle key={i} cx="320" cy="40" r={i * 55} stroke="white" strokeWidth="1" />)}
      <line x1="320" y1="40" x2="320" y2="340" stroke="white" strokeWidth="1" />
      <line x1="320" y1="40" x2="20" y2="340" stroke="white" strokeWidth="1" />
      <line x1="320" y1="40" x2="170" y2="360" stroke="white" strokeWidth="1" />
    </svg>);

}

// ── iPad landscape shell ───────────────────────────────────────────────────
function IPadLandscapeShell({ children }) {
  return (
    <div style={{
      width: SHELL_W, height: SHELL_H,
      background: '#1B1B1D',
      borderRadius: 36,
      boxShadow: '0 40px 100px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.09), inset 0 0 0 1px rgba(255,255,255,0.04)',
      position: 'relative',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      padding: `${BEZEL}px ${BEZEL}px 0`
    }}>
      {/* Camera — top edge, right side */}
      <div style={{
        position: 'absolute', top: BEZEL + 12, right: 80,
        width: 8, height: 8, borderRadius: '50%',
        background: '#252527',
        boxShadow: 'inset 0 0 0 2px rgba(255,255,255,0.04)',
        zIndex: 10
      }} />
      {/* Side button (right) */}
      <div style={{
        position: 'absolute', right: -3, top: '38%',
        width: 4, height: 36, borderRadius: 3,
        background: '#242426'
      }} />
      {/* Volume buttons (left) */}
      <div style={{ position: 'absolute', left: -3, top: '30%', width: 4, height: 28, borderRadius: 3, background: '#242426' }} />
      <div style={{ position: 'absolute', left: -3, top: '44%', width: 4, height: 28, borderRadius: 3, background: '#242426' }} />

      {/* Screen */}
      <div style={{
        width: SCREEN_W, height: SCREEN_H,
        borderRadius: 24, overflow: 'hidden',
        background: '#000', position: 'relative'
      }}>{children}</div>

      {/* Home bar */}
      <div style={{ height: 44, width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ width: 100, height: 4, borderRadius: 100, background: 'rgba(255,255,255,0.18)' }} />
      </div>
    </div>);

}

// ── CTA button ─────────────────────────────────────────────────────────────
function StartButton({ active, goal }) {
  const g = GOALS.find((x) => x.id === goal);
  return (
    <button disabled={!active} style={{
      height: 50, borderRadius: 14, border: 'none',
      cursor: active ? 'pointer' : 'default',
      background: active ?
      `linear-gradient(135deg, ${g.color} 0%, ${g.color}CC 100%)` :
      'rgba(255,255,255,0.07)',
      color: active ? '#fff' : 'rgba(255,255,255,0.2)',
      fontFamily: "'Barlow Condensed', sans-serif",
      fontWeight: 800, fontSize: 18, letterSpacing: '0.08em', textTransform: 'uppercase',
      transition: 'all 0.28s cubic-bezier(0.34,1.56,0.64,1)',
      boxShadow: active ? `0 6px 24px ${g.color}40` : 'none',
      transform: active ? 'scale(1)' : 'scale(0.98)',
      minWidth: 220, padding: '0 28px',
      position: 'relative', overflow: 'hidden',
      whiteSpace: 'nowrap'
    }}>
      {active &&
      <div style={{
        position: 'absolute', inset: 0,
        background: 'linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%)',
        backgroundSize: '400px 100%',
        animation: 'shimmer 2.2s infinite linear'
      }} />
      }
      <span style={{ position: 'relative' }}>
        {active ? 'Start Session →' : 'Select a Goal'}
      </span>
    </button>);

}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [tweaks, setTweaks] = useState({ ...TWEAK_DEFAULTS });

  useEffect(() => {const t = setTimeout(() => setRevealed(true), 60);return () => clearTimeout(t);}, []);

  useEffect(() => {
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', h);
    return () => window.removeEventListener('message', h);
  }, []);

  const setTweak = (k, v) => {
    setTweaks((p) => ({ ...p, [k]: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  // Responsive shell scaling
  const [shellScale, setShellScale] = useState(1);
  useEffect(() => {
    const calc = () => setShellScale(Math.min(
      window.innerWidth / (SHELL_W + 40),
      window.innerHeight / (SHELL_H + 40),
      1
    ));
    calc();
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, []);

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: '100vw', height: '100vh', background: '#080809' }}>
      {/* Scaled shell wrapper */}
      <div style={{ position: 'relative', width: SHELL_W * shellScale, height: SHELL_H * shellScale, flexShrink: 0 }}>
        <div style={{ position: 'absolute', top: 0, left: 0, width: SHELL_W, height: SHELL_H, transform: `scale(${shellScale})`, transformOrigin: 'top left' }}>
          <IPadLandscapeShell>
            {/* ── Screen ── */}
            <div style={{
              width: '100%', height: '100%',
              background: 'linear-gradient(155deg, #141518 0%, #0C0D0F 55%, #0E0D12 100%)',
              display: 'flex', flexDirection: 'column',
              position: 'relative', overflow: 'hidden'
            }}>
              <RadarDecor />

              {/* Status bar */}
              <div style={{
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                padding: '14px 28px 6px',
                fontFamily: "'Barlow', sans-serif", fontSize: 12,
                color: 'rgba(255,255,255,0.38)', flexShrink: 0
              }}>
                <span style={{ fontWeight: 500 }}>9:41 AM</span>
                <div style={{ display: 'flex', gap: 7, alignItems: 'center' }}>
                  <svg width="16" height="11" viewBox="0 0 17 12" fill="none">
                    {[0, 1, 2, 3].map((i) => <rect key={i} x={i * 4} y={12 - (4 + i * 2.5)} width="3" height={4 + i * 2.5} rx="0.7" fill="rgba(255,255,255,0.5)" />)}
                  </svg>
                  <svg width="15" height="11" viewBox="0 0 16 12" fill="none">
                    <rect x="0.5" y="0.5" width="13" height="11" rx="2" stroke="rgba(255,255,255,0.32)" />
                    <rect x="2" y="2" width="10" height="8" rx="1" fill="rgba(255,255,255,0.5)" />
                    <path d="M14.5 4v4c.8-.4 1.5-1.2 1.5-2s-.7-1.6-1.5-2z" fill="rgba(255,255,255,0.28)" />
                  </svg>
                </div>
              </div>

              {/* Header row: logo | headline | avatar */}
              <div style={{
                display: 'flex', alignItems: 'center',
                padding: '6px 28px 10px', gap: 24, flexShrink: 0,
                animation: revealed ? 'fadeUp 0.45s ease both' : 'none'
              }}>
                <TrackManLogo color={tweaks.accentColor} />

                {/* Divider */}
                <div style={{ width: 1, height: 36, background: 'rgba(255,255,255,0.1)', flexShrink: 0 }} />

                {/* Headline */}
                <div style={{ flex: 1 }}>
                  <div style={{
                    fontFamily: "'Barlow Condensed', sans-serif",
                    fontWeight: 900, fontSize: 36, lineHeight: 1.0,
                    letterSpacing: '-0.01em', textTransform: 'uppercase', color: '#fff'
                  }}>
                    Bill, what are you{' '}
                    <span style={{ color: tweaks.accentColor, fontStyle: 'italic' }}>working on</span>
                    {' '}today?
                  </div>
                  {tweaks.showSubtitle &&
                  <div style={{
                    fontFamily: "'Barlow', sans-serif", fontSize: 13,
                    color: 'rgba(255,255,255,0.38)', marginTop: 3
                  }}>
                      TrackMan tracks every swing. You pick the target.
                    </div>
                  }
                </div>

                {/* Avatar */}
                <div style={{
                  width: 40, height: 40, borderRadius: '50%', flexShrink: 0,
                  background: 'rgba(255,255,255,0.06)',
                  border: '1.5px solid rgba(255,255,255,0.12)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700,
                  fontSize: 14, color: 'rgba(255,255,255,0.5)'
                }}>BF</div>
              </div>

              {/* Divider */}
              <div style={{ height: 1, background: 'rgba(255,255,255,0.06)', margin: '0 28px', flexShrink: 0 }} />

              {/* 3×2 card grid */}
              <div style={{
                display: 'grid',
                gridTemplateColumns: '1fr 1fr 1fr',
                gridTemplateRows: '1fr 1fr',
                gap: 10,
                padding: '12px 28px',
                flex: 1,
                minHeight: 0
              }}>
                {GOALS.map((g, i) =>
                <GoalCard
                  key={g.id}
                  goal={g}
                  selected={selected}
                  onSelect={setSelected}
                  index={i}
                  revealed={revealed} />

                )}
              </div>

              {/* Footer */}
              <div style={{ padding: '6px 28px 14px', flexShrink: 0 }}>
                <div style={{ fontFamily: "'Barlow', sans-serif", fontSize: 11, color: 'rgba(255,255,255,0.18)', letterSpacing: '0.02em', textAlign: 'center' }}>
                  Session data synced automatically
                </div>
              </div>
            </div>
          </IPadLandscapeShell>
        </div>
      </div>

      {/* Tweaks panel */}
      {tweaksVisible &&
      <div style={{
        position: 'fixed', bottom: 20, right: 20, width: 268, borderRadius: 14,
        background: 'rgba(18,19,23,0.97)', border: '1px solid rgba(255,255,255,0.11)',
        backdropFilter: 'blur(20px)', boxShadow: '0 16px 50px rgba(0,0,0,0.7)',
        padding: '18px', zIndex: 9999,
        fontFamily: "'Barlow', sans-serif", color: '#fff'
      }}>
          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 800, fontSize: 16, letterSpacing: '0.07em', textTransform: 'uppercase', marginBottom: 16, color: tweaks.accentColor }}>Tweaks</div>

          <label style={{ fontSize: 11, color: 'rgba(255,255,255,0.45)', letterSpacing: '0.08em', textTransform: 'uppercase', display: 'block', marginBottom: 8 }}>Accent Color</label>
          <div style={{ display: 'flex', gap: 7, marginBottom: 16 }}>
            {['#FF6B1A', '#F5A623', '#00C2FF', '#5BC8AF', '#E040FB'].map((c) =>
          <div key={c} onClick={() => setTweak('accentColor', c)} style={{
            width: 26, height: 26, borderRadius: 7, background: c, cursor: 'pointer',
            border: tweaks.accentColor === c ? '2.5px solid white' : '2.5px solid transparent',
            transition: 'border 0.15s'
          }} />
          )}
          </div>

          <label style={{ fontSize: 11, color: 'rgba(255,255,255,0.45)', letterSpacing: '0.08em', textTransform: 'uppercase', display: 'block', marginBottom: 8 }}>Subtitle</label>
          <div style={{ display: 'flex', gap: 7 }}>
            {[true, false].map((v) =>
          <div key={String(v)} onClick={() => setTweak('showSubtitle', v)} style={{
            padding: '5px 14px', borderRadius: 7, cursor: 'pointer',
            background: tweaks.showSubtitle === v ? tweaks.accentColor : 'rgba(255,255,255,0.07)',
            fontSize: 12, fontWeight: 600, transition: 'background 0.15s'
          }}>{v ? 'Show' : 'Hide'}</div>
          )}
          </div>
        </div>
      }
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
